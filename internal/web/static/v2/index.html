<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>wrai.th · v2</title>
  <link rel="stylesheet" href="./v2.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="hdr">
      <div class="hdr-left">
        <span class="wordmark">wrai<span class="dot">.</span>th</span>
        <span class="ver">v2</span>
        <nav class="tabs" id="tabs" aria-label="Sections">
          <a class="tab" href="#/overview" data-route="overview">overview</a>
          <a class="tab" href="#/board" data-route="board">board</a>
          <a class="tab" href="#/stats" data-route="stats">stats</a>
          <a class="tab" href="#/notifications" data-route="notifications">notifications</a>
        </nav>
      </div>
      <div class="hdr-right">
        <span class="live" id="liveStatus" data-state="connecting">
          <span class="live-dot"></span><span class="live-label" id="liveLabel">connecting</span>
        </span>
        <label class="proj">
          <select id="projectSelect" aria-label="Project"></select>
        </label>
      </div>
    </header>

    <main class="view" id="view">
      <!-- ============ OVERVIEW ============ -->
      <section class="page main" data-page="overview">
        <section class="kpis" id="kpis" aria-label="Key metrics">
          <article class="card kpi" data-skel><span class="kpi-label">tasks done</span><span class="kpi-num">—</span><span class="kpi-sub"></span><svg class="kpi-spark" viewBox="0 0 100 28" preserveAspectRatio="none" aria-hidden="true"></svg></article>
          <article class="card kpi" data-skel><span class="kpi-label">in progress</span><span class="kpi-num">—</span><span class="kpi-sub"></span></article>
          <article class="card kpi" data-skel><span class="kpi-label">blocked</span><span class="kpi-num">—</span><span class="kpi-sub"></span></article>
          <article class="card kpi" data-skel><span class="kpi-label">tokens · 24h</span><span class="kpi-num">—</span><span class="kpi-sub"></span></article>
        </section>

        <section class="card dist" id="dist" aria-label="Status distribution" data-skel>
          <div class="card-head"><span class="card-label">status distribution</span><span class="card-meta" id="distTotal"></span></div>
          <div class="distbar" id="distBar"></div>
          <div class="legend" id="distLegend"></div>
        </section>

        <section class="zone">
          <article class="card load" id="loadCard" aria-label="Agent load" data-skel>
            <div class="card-head"><span class="card-label">agent load</span><span class="card-meta" id="loadMeta"></span></div>
            <div class="load-body" id="loadBody"></div>
          </article>
          <article class="card feed" id="feedCard" aria-label="Activity feed">
            <div class="card-head"><span class="card-label">activity</span><span class="card-meta" id="feedMeta">live</span></div>
            <div class="feed-body" id="feedBody"></div>
          </article>
        </section>
      </section>

      <!-- ============ BOARD ============ -->
      <section class="page" data-page="board" hidden>
        <div class="board-bar">
          <div class="distbar board-dist" id="boardDist" aria-label="Status distribution"></div>
          <div class="board-controls">
            <div class="cycle-filter" id="cycleFilter" hidden></div>
            <span class="board-mode" id="boardMode"></span>
          </div>
        </div>
        <div class="board" id="board" aria-label="Kanban board"></div>
      </section>

      <!-- ============ STATS ============ -->
      <section class="page main" data-page="stats" hidden>
        <div class="stats-head">
          <div class="cycle-filter" id="statsCycleFilter" hidden></div>
        </div>
        <section class="kpis" id="statKpis" aria-label="Key metrics"></section>
        <section class="zone">
          <article class="card" id="cardThroughput" aria-label="Throughput"></article>
          <article class="card" id="cardBurndown" aria-label="Burndown"></article>
        </section>
        <section class="zone">
          <article class="card" id="cardTimeState" aria-label="Time in state"></article>
          <article class="card" id="cardPerAgent" aria-label="Per agent"></article>
        </section>
        <section class="card" id="cardBlocked" aria-label="Currently blocked"></section>
      </section>

      <!-- ============ NOTIFICATIONS ============ -->
      <section class="page main" data-page="notifications" hidden>
        <article class="card" id="rulesCard" aria-label="Notification rules">
          <div class="card-head"><span class="card-label">notification rules</span><span class="card-meta" id="rulesMeta"></span></div>
          <div class="rules-body" id="rulesBody"></div>
        </article>
        <article class="card" id="deliveriesCard" aria-label="Delivery log">
          <div class="card-head"><span class="card-label">delivery log</span><span class="card-meta" id="deliveriesMeta"></span></div>
          <div class="deliveries-body" id="deliveriesBody"></div>
        </article>
      </section>
    </main>
  </div>

  <!-- Slide-over (board card detail) -->
  <div class="sheet-scrim" id="sheetScrim" hidden></div>
  <aside class="sheet" id="sheet" hidden aria-label="Task detail" role="dialog" aria-modal="true"></aside>

  <script type="module" src="./v2.js"></script>
</body>
</html>
