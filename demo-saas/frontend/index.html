<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BurnMeter</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="bar">
    <h1 class="wordmark">BurnMeter <span aria-hidden="true">🔥</span></h1>
    <div class="share" hidden>
      <code class="url" id="room-url"></code>
      <button type="button" id="copy-btn" class="ghost">copy</button>
    </div>
  </header>

  <main>
    <section class="ticker" aria-live="polite">
      <div class="amount" id="amount">$0.00 burned</div>
      <div class="clock" id="clock">00:00:00</div>
    </section>

    <section class="controls">
      <button type="button" id="start-btn" class="primary">Start</button>
      <button type="button" id="pause-btn" disabled>Pause</button>
      <button type="button" id="reset-btn" class="ghost">Reset</button>
    </section>

    <section class="panel">
      <div class="attendees">
        <label for="attendees-input">Attendees <small>— one per line: <em>name, hourly-rate</em></small></label>
        <textarea id="attendees-input" rows="6" placeholder="Priya, 180&#10;Dan, 220&#10;Rae, 160"></textarea>
        <button type="button" id="save-btn">Save attendees</button>
      </div>

      <aside class="chips">
        <ul id="chip-list"></ul>
        <div class="sumline" id="sumline">—</div>
      </aside>
    </section>

    <section class="ouch">
      <label for="ouch-input">Ouch line $</label>
      <input type="number" id="ouch-input" min="0" step="10" value="500">
    </section>
  </main>

  <footer class="foot">
    <span id="status">idle</span>
  </footer>

  <script src="/static/app.js" defer></script>
</body>
</html>
