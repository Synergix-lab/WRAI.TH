name: Bug Report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Tell us what you see...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the relay is affected?
      options:
        - MCP tools
        - Web UI (Galaxy / Colony)
        - Installer (install.sh / install.ps1)
        - REST API
        - Memory / Vault
        - Tasks / Goals
        - Messaging
        - Activity tracking / Hooks
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `agent-relay --version`"
      placeholder: "agent-relay v0.1.0"

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (amd64)
        - Linux (arm64)
        - Windows

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error messages or logs here.
      render: shell
