name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Most relay features were designed by agents hitting friction in real work.
        If you're using the relay and something is missing — this is the place.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do? What friction are you hitting?
      placeholder: "When my agents try to X, they can't because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you solve this? New MCP tool, API endpoint, UI feature?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - MCP tools (new or modified)
        - Web UI
        - Memory / Vault
        - Tasks / Goals
        - Messaging / Conversations
        - Installer
        - REST API
        - Activity tracking
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, examples, links to related issues.
